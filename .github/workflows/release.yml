name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up minimum Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Validate tag and changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]
          version="${tag#v}"
          grep -Eq "^## \\[${version//./\\.}\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
      - name: Verify tag originates from main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Run release gates
        run: make check FUZZ_TIME=10s BENCH_TIME=1x
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

  publish:
    name: Publish release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build deterministic source archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p dist
          git archive --format=tar --prefix="go-config-${tag}/" "$tag" |
            gzip -n > "dist/go-config-${tag}.tar.gz"
          sha256sum "dist/go-config-${tag}.tar.gz" > "dist/go-config-${tag}.checksums.txt"
      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\] - " { found = 1; capture = 1; next }
            capture && /^## \\[/ { exit }
            capture { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
